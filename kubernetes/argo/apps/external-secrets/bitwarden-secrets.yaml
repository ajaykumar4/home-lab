---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bitwarden-secrets
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: kubernetes
  sources:
    - repoURL: "https://github.com/ajaykumar4/home-lab.git"
      path: kubernetes/apps/external-secrets/bitwarden-secrets
      targetRevision: main
      ref: repo
    - repoURL: https://charts.external-secrets.io
      chart: external-secrets
      targetRevision: 2.3.0
      helm:
        releaseName: bitwarden-secrets
        valueFiles:
          - $repo/kubernetes/apps/external-secrets/bitwarden-secrets/values.yaml
  destination:
    name: in-cluster
    namespace: external-secrets
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    retry:
      limit: 1
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - PruneLast=true
      - RespectIgnoreDifferences=true
