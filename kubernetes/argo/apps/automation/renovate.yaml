---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: renovate
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: '3'
spec:
  project: kubernetes
  sources:
    - repoURL: "https://github.com/ajaykumar4/home-lab.git"
      path: kubernetes/apps/automation/renovate
      targetRevision: main
      ref: repo
    - repoURL: https://docs.renovatebot.com/helm-charts
      chart: renovate
      targetRevision: 37.284.2
      helm:
        releaseName: renovate
        valueFiles:
          - $repo/kubernetes/apps/automation/renovate/values.sops.yaml
  destination:
    name: in-cluster
    namespace: automation
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
