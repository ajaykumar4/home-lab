---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: kubernetes
  sources:
    - repoURL: "https://github.com/ajaykumar4/home-lab.git"
      path: kubernetes/apps/automation/arc
      targetRevision: main
      ref: repo
    - repoURL: https://actions-runner-controller.github.io/actions-runner-controller
      chart: actions-runner-controller
      targetRevision: 0.23.7
      helm:
        releaseName: arc
        valueFiles:
          - $repo/kubernetes/apps/automation/arc/values.yaml
  destination:
    name: in-cluster
    namespace: automation
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
