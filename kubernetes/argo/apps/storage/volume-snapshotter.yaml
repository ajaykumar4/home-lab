---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: volume-snapshotter
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: kubernetes
  source:
    repoURL: "https://github.com/ajaykumar4/home-lab.git"
    path: kubernetes/apps/storage/volume-snapshotter
    targetRevision: main
  destination:
    name: in-cluster
    namespace: kube-system
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    retry:
      limit: 1
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - PruneLast=true
      - RespectIgnoreDifferences=true
