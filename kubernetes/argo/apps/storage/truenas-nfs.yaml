---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: truenas-nfs
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: kubernetes
  sources:
    - repoURL: "https://github.com/ajaykumar4/home-lab.git"
      path: kubernetes/apps/storage/truenas-nfs
      targetRevision: main
      ref: repo
    - repoURL: ghcr.io/democratic-csi/charts
      chart: democratic-csi
      targetRevision: 0.15.1
      helm:
        releaseName: truenas-nfs
        valueFiles:
          - $repo/kubernetes/apps/storage/truenas-nfs/values.yaml
  destination:
    name: in-cluster
    namespace: storage
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    retry:
      limit: 1
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - PruneLast=true
      - RespectIgnoreDifferences=true
