---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: volsync
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: kubernetes
  sources:
    - repoURL: "https://github.com/ajaykumar4/home-lab.git"
      path: kubernetes/apps/storage/volsync
      targetRevision: main
      ref: repo
    - repoURL: https://backube.github.io/helm-charts/
      chart: volsync
      targetRevision: 0.15.0
      helm:
        releaseName: volsync
        valueFiles:
          - $repo/kubernetes/apps/storage/volsync/values.yaml
  destination:
    name: in-cluster
    namespace: storage
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    retry:
      limit: 1
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - PruneLast=true
      - RespectIgnoreDifferences=true
