---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: clickhouse
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: '0'
spec:
  project: kubernetes
  sources:
    - repoURL: "https://github.com/ajaykumar4/home-lab.git"
      path: kubernetes/apps/database/clickhouse
      targetRevision: main
      ref: repo
    - repoURL: https://charts.bitnami.com/bitnami
      chart: clickhouse
      targetRevision: 6.2.0
      helm:
        releaseName: clickhouse
        valueFiles:
          - $repo/kubernetes/apps/database/clickhouse/values.yaml
  destination:
    name: in-cluster
    namespace: database
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    retry:
      limit: 1
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - PruneLast=true
      - RespectIgnoreDifferences=true
