---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keda
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: '3'
spec:
  project: kubernetes
  sources:
    - repoURL: "https://github.com/ajaykumar4/home-lab.git"
    # Pointing to the correct observability path
    path: kubernetes/apps/observability/keda
    targetRevision: main
    ref: repo
    - repoURL: https://kedacore.github.io/charts
      chart: keda
      targetRevision: 2.14.2
      helm:
        releaseName: keda
        valueFiles:
          - $repo/kubernetes/apps/observability/keda/values.yaml
  destination:
    name: in-cluster
    namespace: observability
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    retry:
      limit: 1
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - PruneLast=true
      - RespectIgnoreDifferences=true
