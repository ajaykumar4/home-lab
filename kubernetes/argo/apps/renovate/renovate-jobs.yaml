---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: renovate-jobs
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: kubernetes
  sources:
    - repoURL: "https://github.com/ajaykumar4/home-lab.git"
      path: kubernetes/apps/renovate/renovate-jobs
      targetRevision: main
      ref: repo
  destination:
    name: in-cluster
    namespace: renovate
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
