---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: renovate-operator
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: kubernetes
  sources:
    - repoURL: "https://github.com/ajaykumar4/home-lab.git"
      path: kubernetes/apps/renovate/renovate-operator
      targetRevision: main
      ref: repo
    - repoURL: ghcr.io/mogenius/helm-charts
      chart: renovate-operator
      targetRevision: 4.3.0
      helm:
        releaseName: renovate-operator
        valueFiles:
          - $repo/kubernetes/apps/renovate/renovate-operator/values.yaml
  destination:
    name: in-cluster
    namespace: renovate
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
