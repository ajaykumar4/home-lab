apiVersion: batch/v1
kind: Job
metadata:
  name: velero-pre-upgrade-backup
  namespace: system-upgrade
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      containers:
        - name: velero
          image: velero/velero:v1.13.0
          command:
            - /bin/sh
            - -c
            - |
              velero backup create pre-upgrade-$(date +%s) --wait
      restartPolicy: Never
      serviceAccountName: velero
