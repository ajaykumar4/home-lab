apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cert-manager-secret
spec:
  refreshInterval: "1h0m0s"
  target:
    name: cert-manager-secret
  secretStoreRef:
    name: passbolt
    kind: ClusterSecretStore
  data:
    - secretKey: api-token
      remoteRef:
        key: 2663d32c-47b4-4e4c-917d-95cd4bae8fb8
        property: api-token
    - secretKey: domain
      remoteRef:
        key: 2663d32c-47b4-4e4c-917d-95cd4bae8fb8
        property: domain
