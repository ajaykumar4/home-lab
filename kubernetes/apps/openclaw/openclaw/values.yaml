controllers:
    openclaw:
        strategy: Recreate
        annotations:
            reloader.stakater.com/auto: "true"
        initContainers:
          init-config:
            image:
                repository: busybox
                tag: 1.37
            command:
              - sh
              - -c
              - |
                cp /config/openclaw.json /home/node/.openclaw/openclaw.json
                mkdir -p /home/node/.openclaw/workspace
                cp /config/AGENTS.md /home/node/.openclaw/workspace/AGENTS.md
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
            resources:
                requests:
                    cpu: 50m
                    memory: 32Mi
                limits:
                    cpu: 100m
                    memory: 64Mi
        containers:
            app:
                image:
                    repository: ghcr.io/openclaw/openclaw
                    tag: 2026.3.24
                env:
                    HOME: /home/node
                    OPENCLAW_CONFIG_DIR: /home/node/.openclaw
                    NODE_ENV: production
                envFrom:
                    - secretRef:
                        name: openclaw-secret
                probes:
                    liveness:
                        enabled: true
                        custom: true
                        spec:
                            httpGet:
                                path: /healthz
                                port: 18789
                            initialDelaySeconds: 60
                            periodSeconds: 30
                            timeoutSeconds: 10
                            failureThreshold: 3
                    readiness:
                        enabled: true
                        custom: true
                        spec:
                            httpGet:
                                path: /readyz
                                port: 18789
                            initialDelaySeconds: 15
                            periodSeconds: 10
                            timeoutSeconds: 5
                            failureThreshold: 3
                securityContext:
                  runAsUser: 1000
                  runAsGroup: 1000
                  runAsNonRoot: true
                  readOnlyRootFilesystem: true
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                      - ALL
                resources:
                    requests:
                        cpu: 200m
                        memory: 512Mi
                    limits:
                        cpu: 2000m
                        memory: 2Gi

defaultPodOptions:
    securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000

service:
    app:
        ports:
            http:
                port: 18789

route:
    app:
        hostnames:
            - openclaw.aknuk.dev
        parentRefs:
            - name: envoy-external
              namespace: network
              sectionName: https
        rules:
            - backendRefs:
                - identifier: app
                  port: 18789

persistence:
    config:
        type: configMap
        identifier: openclaw-config
        advancedMounts:
          openclaw:
            init-config:
              - path: /config
                subPath: openclaw.json
                readOnly: true
              - path: /config
                subPath: AGENTS.md
                readOnly: true
            app:
              - path: /config
                subPath: openclaw.json
                readOnly: true
              - path: /config
                subPath: AGENTS.md
                readOnly: true
    data:
      enabled: true
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      storageClass: nfs-shared
      size: 5Gi
      advancedMounts:
        openclaw:
          init-config:
            - path: /home/node/.openclaw
          app:
            - path: /home/node/.openclaw