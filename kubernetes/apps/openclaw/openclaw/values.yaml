controllers:
    openclaw:
        strategy: Recreate
        initContainers:
          init-config:
            image:
                repository: busybox
                tag: 1.37
            command:
              - sh
              - -c
              - |
                cp /config/openclaw.json /home/node/.openclaw/openclaw.json
                mkdir -p /home/node/.openclaw/workspace
                cp /config/AGENTS.md /home/node/.openclaw/workspace/AGENTS.md
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
            resources:
                requests:
                    cpu: 50m
                    memory: 32Mi
                limits:
                    cpu: 100m
                    memory: 64Mi
        containers:
            app:
                image:
                    repository: ghcr.io/openclaw/openclaw
                    tag: 2026.3.24
                env:
                    HOME: /home/node
                    OPENCLAW_CONFIG_DIR: /home/node/.openclaw
                    NODE_HOME: /home/node
                    NODE_ENV: production
                envFrom:
                    - secretRef:
                        identifier: secret
                probes:
                    liveness:
                        enabled: true
                        type: TCP
                        spec:
                          tcpSocket:
                            port: 18789
                          initialDelaySeconds: 60
                          periodSeconds: 30
                          timeoutSeconds: 10
                          failureThreshold: 3
                    readiness:
                        enabled: true
                        type: TCP
                        spec:
                          tcpSocket:
                            port: 18789
                          initialDelaySeconds: 15
                          periodSeconds: 10
                          timeoutSeconds: 5
                          failureThreshold: 3
                securityContext:
                  runAsUser: 1000
                  runAsGroup: 1000
                  runAsNonRoot: true
                  readOnlyRootFilesystem: true
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                      - ALL
                resources:
                    requests:
                        cpu: 200m
                        memory: 512Mi
                    limits:
                        cpu: 2000m
                        memory: 2Gi

defaultPodOptions:
    securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000

service:
    app:
        ports:
            http:
                port: 18789

persistence:
  config:
    enabled: true
    type: configMap
    identifier: config
    globalMounts:
      - path: /config
        readOnly: true
  data:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    storageClass: nfs-shared
    size: 25Gi
    globalMounts:
      - path: /home/node/.openclaw
  tmp:
    enabled: true
    type: emptyDir
    globalMounts:
      - path: /tmp
      - path: /home/linuxbrew
      - path: /home/node/.node
      - path: /home/node/.npm