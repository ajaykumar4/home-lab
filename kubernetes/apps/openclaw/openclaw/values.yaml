image:
    repository: ghcr.io/openclaw/openclaw
    tag: 2026.3.13
credentials:
    existingSecret: openclaw-secret
chromium:
    image:
        repository: zenika/alpine-chrome
        tag: 124
persistence:
    enabled: true
    size: 20Gi
    storageClass: nfs-shared
    accessMode: ReadWriteOnce
resources:
    requests:
        cpu: 100m
        memory: 512Mi
    limits:
        cpu: 2000m
        memory: 12Gi
podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: Always
    runAsNonRoot: true
    seccompProfile:
        type: RuntimeDefault
