    config:
        # @schema type:boolean;default:true
        enabled: true
        # @schema type:string;default:configMap
        type: configMap
        # @schema type:string;default:config
        identifier: config
        advancedMounts:
            main:
                init-config:
                    - path: /config
                      readOnly: true
    # Shell alias file mounted from ConfigMap for interactive kubectl exec sessions
    bash-aliases:
        enabled: true
        type: configMap
        identifier: config
        advancedMounts:
            main:
                main:
                    - path: /home/node/.bash_aliases
                      subPath: bash_aliases
                      readOnly: true
