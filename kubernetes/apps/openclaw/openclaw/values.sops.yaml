image:
    repository: ghcr.io/openclaw/openclaw
    tag: 2026.3.13-1
credentials:
    existingSecret: openclaw-secret
chromium:
    image:
        repository: zenika/alpine-chrome
        tag: 124
openclaw:
    bind: lan
    configOverrides:
        gateway:
            controlUi:
                allowedOrigins:
                    - https://openclaw.aknuk.dev
persistence:
    enabled: true
    size: 20Gi
    storageClass: nfs-shared
    accessMode: ReadWriteOnce
resources:
    requests:
        cpu: 100m
        memory: 512Mi
    limits:
        cpu: 2000m
        memory: 12Gi
securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: Always
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
        drop:
            - ALL
    readOnlyRootFilesystem: false
    seccompProfile:
        type: RuntimeDefault
