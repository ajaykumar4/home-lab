                    - path: ENC[AES256_GCM,data:muiBpcRiRachji/a3oZv3d9VOkI=,iv:OwVg6keZyO1C2/pMzYKywltp8ekn3vBKjTpUnq3pfzY=,tag:E9k6CXgk/DfaYak0lndtZA==,type:str]
