image:
    repository: ghcr.io/openclaw/openclaw
    tag: 2026.3.13-1
credentials:
    existingSecret: openclaw-secret
chromium:
    image:
        repository: zenika/alpine-chrome
        tag: 124
openclaw:
    bind: lan
    skills:
        - apple-notes
        - apple-reminders
        - bear-notes
        - blogwatcher
        - blucli
        - bluebubbles
        - camsnap
        - clawhub
        - coding-agent
        - discord
        - eightctl
        - gemini
        - gh-issues
        - gifgrep
        - github
        - gog
        - goplaces
        - himalaya
        - imsg
        - mcporter
        - model-usage
        - nano-banana-pro
        - nano-pdf
        - ordercli
        - peekaboo
        - session-logs
        - slack
        - spotify-player
        - things-mac
        - tmux
        - voice-call
        - video-frames
        - wacli
        - xurl
    configOverrides:
        gateway:
            controlUi:
                allowedOrigins:
                    - https://openclaw.aknuk.dev
persistence:
    enabled: true
    size: 20Gi
    storageClass: nfs-shared
    accessMode: ReadWriteOnce
resources:
    requests:
        cpu: 100m
        memory: 512Mi
    limits:
        cpu: 2000m
        memory: 12Gi
podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: Always
    runAsNonRoot: true
    seccompProfile:
        type: RuntimeDefault
