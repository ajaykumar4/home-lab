preUpgradeHook:
  enabled: false
localpv-provisioner:
  analytics:
    enabled: false
  localpv:
    image:
      registry: quay.io/
    basePath: &hostPath /var/mnt/local-hostpath
  hostpathClass:
    enabled: true
    name: local-hostpath
    isDefaultClass: false
    basePath: *hostPath
  helperPod:
    image:
      registry: quay.io/
loki:
  enabled: false
alloy:
  enabled: false
minio:
  enabled: false
openebs-crds:
  csi:
    volumeSnapshots:
      enabled: false
      keep: false
zfs-localpv:
  enabled: false
lvm-localpv:
  enabled: false
mayastor:
  enabled: false
engines:
  local:
    lvm:
      enabled: false
    zfs:
      enabled: false
  replicated:
    mayastor:
      enabled: false
