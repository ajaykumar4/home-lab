---
apiVersion: batch/v1
kind: Job
metadata:
  name: s3-csi-create-home-lab-bucket
  namespace: storage
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: default
      volumes:
        - name: s3-creds
          secret:
            secretName: csi-s3-secret
            optional: false
      containers:
        - name: create-bucket
          image: rustfs/rc:v0.1.15
          volumeMounts:
            - name: s3-creds
              mountPath: /credentials
              readOnly: true
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: csi-s3-secret
                  key: accessKeyID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: csi-s3-secret
                  key: secretAccessKey
            - name: AWS_ENDPOINT_URL
              valueFrom:
                secretKeyRef:
                  name: csi-s3-secret
                  key: endpoint
          command:
            - /bin/sh
            - -c
            - |
              set -e

              echo "Loading S3 credentials..."
              echo "Endpoint: $AWS_ENDPOINT_URL"

              # Configure rc alias for rustfs
              rc alias set rustfs "$AWS_ENDPOINT_URL" "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY"

              # Create home-lab bucket for main storage
              echo "Creating/checking home-lab bucket..."
              rc mb rustfs/home-lab || echo "Bucket home-lab already exists"

              # Create service-specific buckets for static provisioning
              for bucket in grafana loki tempo mimir opencost; do
                echo "Creating/checking $bucket bucket..."
                rc mb "rustfs/$bucket" || echo "Bucket $bucket already exists"
              done

              echo "All buckets created/verified successfully!"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
