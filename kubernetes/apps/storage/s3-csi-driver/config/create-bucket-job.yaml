---
apiVersion: batch/v1
kind: Job
metadata:
  name: s3-csi-create-home-lab-bucket
  namespace: storage
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      volumes:
        - name: s3-creds
          secret:
            secretName: csi-s3-secret
            optional: true
      containers:
        - name: create-bucket
          image: rustfs/rc:v0.1.12
          volumeMounts:
            - name: s3-creds
              mountPath: /credentials
              readOnly: true
          command:
            - /bin/sh
            - -c
            - |
              until [ -s /credentials/accessKeyID ] && [ -s /credentials/secretAccessKey ]; do
                echo "Waiting for csi-s3-secret..."
                sleep 5
              done
              AWS_ACCESS_KEY_ID="$(cat /credentials/accessKeyID)"
              AWS_SECRET_ACCESS_KEY="$(cat /credentials/secretAccessKey)"
              ENDPOINT="$(cat /credentials/endpoint)"
              rc alias set rustfs "${ENDPOINT}" "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY"
              # Create home-lab bucket for main storage
              if ! rc ls rustfs/home-lab > /dev/null 2>&1; then
                rc mb rustfs/home-lab
                echo "Created home-lab bucket"
              else
                echo "Bucket home-lab already exists, ignoring."
              fi
              # Create service-specific buckets for static provisioning
              for bucket in grafana loki tempo mimir opencost; do
                if ! rc ls "rustfs/$bucket" > /dev/null 2>&1; then
                  rc mb "rustfs/$bucket"
                  echo "Created $bucket bucket"
                else
                  echo "Bucket $bucket already exists, ignoring."
                fi
              done
