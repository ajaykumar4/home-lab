apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: truenas-iscsi-driver-config
  namespace: storage
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  target:
    name: truenas-iscsi-driver-config
    template:
      engineVersion: v2
      data:
        driver-config-file.yaml: |
          driver: freenas-api-iscsi
          httpConnection:
            allowInsecure: true
            apiKey: {{ .token }}
            host: 192.168.8.3
            port: 80
            protocol: http
          instance_id: null
          iscsi:
            targetPortal: "192.168.8.2:3260"
            targetPortals: []
            interface:
            namePrefix: csi-
            nameSuffix: "-cluster"
            targetGroups:
              - targetGroupPortalGroup: 1
                targetGroupInitiatorGroup: 1
                targetGroupAuthType: None
                targetGroupAuthGroup:
            extentCommentTemplate: '"{{ "{{ parameters.[csi.storage.k8s.io/pvc/namespace] }}/{{ parameters.[csi.storage.k8s.io/pvc/name] }}" }}"'
            extentInsecureTpc: true
            extentXenCompat: false
            extentRpm: "SSD"
            extentBlocksize: 512
            extentAvailThreshold: 0
          zfs:
            datasetParentName: home-lab/iscsi/kubernetes/volumes
            detachedSnapshotsDatasetParentName: home-lab/iscsi/kubernetes/snapshots
            zvolCompression:
            zvolDedup:
            zvolEnableReservation: false
            zvolBlocksize:
            datasetProperties:
              "org.freenas:description": '"{{ "{{ parameters.[csi.storage.k8s.io/pvc/namespace] }}/{{ parameters.[csi.storage.k8s.io/pvc/name] }}" }}"'
  dataFrom:
    - extract:
        key: 80db377c-daca-49a8-b74a-b42801215638
