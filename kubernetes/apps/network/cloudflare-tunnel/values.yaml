controllers:
    cloudflare-tunnel:
        strategy: RollingUpdate
        annotations:
            reloader.stakater.com/auto: "true"
        containers:
            app:
                image:
                    repository: docker.io/cloudflare/cloudflared
                    tag: 2026.3.0
                env:
                    NO_AUTOUPDATE: true
                    TUNNEL_METRICS: 0.0.0.0:8080
                    # disable when using http2
                    TUNNEL_POST_QUANTUM: true
                    # or http2
                    TUNNEL_TRANSPORT_PROTOCOL: quic
                envFrom:
                    - secretRef:
                        name: cloudflare-tunnel-secret
                args:
                    - tunnel
                    - run
                probes:
                    liveness:
                        enabled: true
                        custom: true
                        spec:
                            httpGet:
                                path: /ready
                                port: 8080
                            initialDelaySeconds: 0
                            periodSeconds: 10
                            timeoutSeconds: 1
                            failureThreshold: 3
                    readiness:
                        enabled: true
                        custom: true
                        spec:
                            httpGet:
                                path: /ready
                                port: 8080
                            initialDelaySeconds: 0
                            periodSeconds: 10
                            timeoutSeconds: 1
                            failureThreshold: 3
                securityContext:
                    allowPrivilegeEscalation: false
                    readOnlyRootFilesystem: true
                    capabilities:
                        drop:
                            - ALL
                resources:
                    requests:
                        cpu: 10m
                    limits:
                        memory: 256Mi
defaultPodOptions:
    securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
service:
    app:
        ports:
            http:
                port: 8080
serviceMonitor:
    app:
        endpoints:
            - port: http
configMaps:
  config:
    data:
      config.yaml: |-
        ingress:
          - hostname: "*.aknuk.dev"
            originRequest:
              http2Origin: true
              noTLSVerify: true
              originServerName: "external.aknuk.dev"
            service: https://envoy-external.network.svc.cluster.local:443
          - service: http_status:404
persistence:
  config-file:
    type: configMap
    identifier: config
    globalMounts:
      - path: /etc/cloudflared/config.yaml
        subPath: config.yaml
