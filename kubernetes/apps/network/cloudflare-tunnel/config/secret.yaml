apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-tunnel-secret
spec:
  refreshInterval: "1h0m0s"
  target:
    name: cloudflare-tunnel-secret
  secretStoreRef:
    name: passbolt
    kind: ClusterSecretStore
  data:
    - secretKey: TUNNEL_TOKEN
      remoteRef:
        key: 2663d32c-47b4-4e4c-917d-95cd4bae8fb8
        property: TunnelSecret
    - secretKey: TUNNEL_DOMAIN
      remoteRef:
        key: 2663d32c-47b4-4e4c-917d-95cd4bae8fb8
        property: domain
