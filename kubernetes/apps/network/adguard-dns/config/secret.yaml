apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: adguard-dns
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  target:
    name: adguard-dns-secret
    template:
      data:
        ADGUARD_URL: "{{ .url }}"
        ADGUARD_USER: "{{ .username }}"
        ADGUARD_PASSWORD: "{{ .password }}"
  dataFrom:
    - extract:
        key: 3b2e6519-f265-408b-aeae-b43d00bd7d91
