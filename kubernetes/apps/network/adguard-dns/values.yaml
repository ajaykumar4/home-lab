fullnameOverride: adguard-dns
provider:
  name: webhook
  webhook:
    image:
      repository: ghcr.io/muhlba91/external-dns-provider-adguard
      tag: 11.1.1
    service:
      port: 8888
    livenessProbe:
      httpGet:
        path: /healthz
        port: 8080
      initialDelaySeconds: 10
      timeoutSeconds: 5
    readinessProbe:
      httpGet:
        path: /healthz
        port: 8080
      initialDelaySeconds: 10
      timeoutSeconds: 5
    env:
      - name: ADGUARD_URL
        valueFrom:
          secretKeyRef:
            name: adguard-dns-secret
            key: ADGUARD_URL
      - name: ADGUARD_USER
        valueFrom:
          secretKeyRef:
            name: adguard-dns-secret
            key: ADGUARD_USER
      - name: ADGUARD_PASSWORD
        valueFrom:
          secretKeyRef:
            name: adguard-dns-secret
            key: ADGUARD_PASSWORD
      - name: LOG_LEVEL
        value: debug
      - name: DRY_RUN
        value: "false"
triggerLoopOnEvent: true
policy: sync
sources:
  - crd
  - gateway-httproute
txtPrefix: k8s.
txtOwnerId: default
serviceMonitor:
  enabled: true
domainFilters:
  - aknuk.dev
podAnnotations:
  reloader.stakater.com/auto: "true"
