apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-domain-config
spec:
  target:
    name: cloudflare-domain-config
    template:
      engineVersion: v2
      type: Opaque
      data:
        domain: "{{ .domain }}"
        tunnel-id: "{{ .tunnelID }}"
  secretStoreRef:
    name: passbolt
    kind: ClusterSecretStore
  data:
    - secretKey: domain
      remoteRef:
        key: cloudflare
        property: domain
    - secretKey: tunnelID
      remoteRef:
        key: cloudflare
        property: TunnelID
