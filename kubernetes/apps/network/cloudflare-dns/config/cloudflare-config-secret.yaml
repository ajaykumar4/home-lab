apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-config
spec:
  target:
    name: cloudflare-config
    template:
      engineVersion: v2
      data:
        domain: "{{ .domain }}"
  secretStoreRef:
    name: passbolt
    kind: ClusterSecretStore
  data:
    - secretKey: domain
      remoteRef:
        key: cloudflare
        property: domain
