apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-dns-secret
spec:
  target:
    name: cloudflare-dns-secret
  secretStoreRef:
    name: passbolt
    kind: ClusterSecretStore
  data:
    - secretKey: api-token
      remoteRef:
        key: cloudflare
        property: api-token
    - secretKey: domain
      remoteRef:
        key: cloudflare
        property: domain
