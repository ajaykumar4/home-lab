apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-dns-secret
spec:
  refreshInterval: "1h0m0s"
  target:
    name: cloudflare-dns-secret
    template:
      engineVersion: v2
      data:
        domain: "{{ (fromJson .cloudflare).Domain }}"
        api-token: "{{ (fromJson .cloudflare).ApiToken }}"
  secretStoreRef:
    name: passbolt
    kind: ClusterSecretStore
  data:
    - secretKey: cloudflare
      remoteRef:
        key: 2663d32c-47b4-4e4c-917d-95cd4bae8fb8
        property: password
