apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-dns
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  target:
    name: cloudflare-dns-secret
    template:
      data:
        domain: "{{ .Domain }}"
        api-token: "{{ .ApiToken }}"
  dataFrom:
    - extract:
        key: cloudflare
