mimir:
  structuredConfig:
    blocks_storage:
      backend: s3
      s3:
        endpoint: s3.aknuk.dev
        bucket_name: mimir-blocks
    alertmanager_storage:
      backend: s3
      s3:
        endpoint: s3.aknuk.dev
        bucket_name: mimir-alertmanager
    ruler_storage:
      backend: s3
      s3:
        endpoint: s3.aknuk.dev
        bucket_name: mimir-ruler
  extraEnvFrom:
    - secretRef:
        name: mimir-s3-secret
