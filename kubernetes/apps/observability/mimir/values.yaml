mimir:
  podAnnotations:
    reloader.stakater.com/auto: "true"
  structuredConfig:
    blocks_storage:
      backend: s3
      s3:
        endpoint: s3.aknuk.dev
        insecure: true
        bucket_lookup_type: path
        bucket_name: mimir-blocks
    alertmanager_storage:
      backend: s3
      s3:
        endpoint: s3.aknuk.dev
        insecure: true
        bucket_lookup_type: path
        bucket_name: mimir-alertmanager
    ruler_storage:
      backend: s3
      s3:
        endpoint: s3.aknuk.dev
        insecure: true
        bucket_lookup_type: path
        bucket_name: mimir-ruler
  extraEnv:
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: mimir-s3-secret
          key: access_key
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: mimir-s3-secret
          key: secret_key
