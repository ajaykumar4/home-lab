mimir:
  structuredConfig:
    blocks_storage:
      backend: s3
      s3:
        endpoint: s3.aknuk.dev
        bucket_name: mimir-blocks
        insecure: false
        access_key_id: ${AWS_ACCESS_KEY_ID}
        secret_access_key: ${AWS_SECRET_ACCESS_KEY}
    ruler_storage:
      backend: s3
      s3:
        endpoint: s3.aknuk.dev
        bucket_name: mimir-ruler
        insecure: false
        access_key_id: ${AWS_ACCESS_KEY_ID}
        secret_access_key: ${AWS_SECRET_ACCESS_KEY}
    alertmanager_storage:
      backend: s3
      s3:
        endpoint: s3.aknuk.dev
        bucket_name: mimir-alertmanager
        insecure: false
        access_key_id: ${AWS_ACCESS_KEY_ID}
        secret_access_key: ${AWS_SECRET_ACCESS_KEY}
global:
  extraEnv:
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: mimir-s3-creds
          key: aws_access_key_id
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: mimir-s3-creds
          key: aws_secret_access_key
minio:
  enabled: false
ingester:
  replicas: 1
  persistentVolume:
    storageClass: s3
store_gateway:
  replicas: 1
  persistentVolume:
    storageClass: s3
compactor:
  persistentVolume:
    storageClass: s3
