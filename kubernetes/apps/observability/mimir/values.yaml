mimir:
  structuredConfig:
    blocks_storage:
      backend: s3
      s3:
        endpoint: s3.aknuk.dev
        bucket_name: mimir
        insecure: false
        access_key_id: ${AWS_ACCESS_KEY_ID}
        secret_access_key: ${AWS_SECRET_ACCESS_KEY}
    ruler_storage:
      backend: s3
      s3:
        endpoint: s3.aknuk.dev
        bucket_name: mimir
        insecure: false
        access_key_id: ${AWS_ACCESS_KEY_ID}
        secret_access_key: ${AWS_SECRET_ACCESS_KEY}
    alertmanager_storage:
      backend: s3
      s3:
        endpoint: s3.aknuk.dev
        bucket_name: mimir
        insecure: false
        access_key_id: ${AWS_ACCESS_KEY_ID}
        secret_access_key: ${AWS_SECRET_ACCESS_KEY}
global:
  extraEnvFrom:
    - secretRef:
        name: mimir-s3-creds
minio:
  enabled: false
ingester:
  replicas: 1
  persistentVolume:
    storageClass: s3
store_gateway:
  replicas: 1
  persistentVolume:
    storageClass: s3
compactor:
  persistentVolume:
    storageClass: s3
