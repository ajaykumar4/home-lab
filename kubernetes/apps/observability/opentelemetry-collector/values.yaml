mode: daemonset
replicaCount: 1

image:
  repository: otel/opentelemetry-collector-contrib

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

    k8s_cluster:
      collection_interval: 30s

    kubeletstats:
      collection_interval: 30s
      auth_type: serviceAccount
      endpoint: https://${K8S_NODE_NAME}:10250
      k8s_api_config:
        auth_type: serviceAccount

    prometheus:
      config:
        scrape_configs:
          - job_name: 'otel-collector'
            scrape_interval: 30s
            static_configs:
              - targets: ['localhost:8888']

    filelog:
      include:
        - /var/log/pods/*/*/*.log
      operators:
        - type: json_parser
          parse_from: body
          parse_to: attributes
          timestamp:
            parse_from: attributes.timestamp
            layout: "%Y-%m-%dT%H:%M:%S.%LZ"

  processors:
    batch:
      send_batch_size: 1000
      timeout: 10s

    memory_limiter:
      check_interval: 1s
      limit_mib: 512
      spike_limit_mib: 128

    attributes:
      actions:
        - key: cluster.name
          value: home-lab
          action: upsert
        - key: deployment.environment
          value: production
          action: upsert

    resource:
      attributes:
        - key: service.namespace
          from_attribute: kubernetes.namespace.name
          action: upsert

  exporters:
    otlp:
      endpoint: victoria-metrics:4317
      tls:
        insecure: true

    prometheusremotewrite:
      endpoint: http://victoria-metrics-vminsert:8400/insert/0/prometheus/api/v1/write

    debug:
      verbosity: detailed

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, batch, attributes, resource]
        exporters: [otlp, debug]

      metrics:
        receivers: [otlp, prometheus, k8s_cluster, kubeletstats]
        processors: [memory_limiter, batch, attributes, resource]
        exporters: [prometheusremotewrite, debug]

      logs:
        receivers: [otlp, filelog]
        processors: [memory_limiter, batch, attributes, resource]
        exporters: [debug]

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

serviceAccount:
  create: true
  name: opentelemetry-collector

extraEnvs:
  - name: K8S_NODE_NAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8888"

serviceMonitor:
  enabled: true
  namespace: observability
  interval: 30s
  scrapeTimeout: 10s
  labels:
    release: prometheus
