fullnameOverride: grafana

initChownData:
  enabled: false

persistence:
  enabled: true
  type: pvc
  storageClassName: s3
  accessModes:
    - ReadWriteOnce
  size: 10Gi

grafana.ini:
  analytics:
    check_for_updates: true
  users:
    allow_sign_up: true
    auto_assign_org: true
    auto_assign_org_role: Viewer
  auth.anonymous:
    enabled: false

serviceMonitor:
  enabled: true

additionalDataSources:
  - name: Loki
    type: loki
    url: http://loki-gateway.observability.svc.cluster.local:80
    access: proxy
    isDefault: false
  - name: Tempo
    type: tempo
    url: http://tempo-query-frontend.observability.svc.cluster.local:3100
    access: proxy
    isDefault: false
  - name: Mimir
    type: prometheus
    url: http://mimir-nginx.observability.svc.cluster.local:80/prometheus
    access: proxy
    isDefault: true

route:
  main:
    enabled: true
    hostnames:
      - grafana.aknuk.dev
    parentRefs:
      - name: envoy-external
        namespace: network
        sectionName: https
