alloy:
  configMap:
    content: |
      logging {
        level = "info"
        format = "logfmt"
      }

      prometheus.scrape "kubernetes" {
        targets = []
        forward_to = [prometheus.remote_write.mimir.receiver]
      }

      prometheus.remote_write "mimir" {
        endpoint {
          url = "http://mimir-nginx.observability.svc.cluster.local:80/api/v1/push"
        }
      }
