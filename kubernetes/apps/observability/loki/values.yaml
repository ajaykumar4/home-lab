loki:
  podAnnotations:
    reloader.stakater.com/auto: "true"
  auth_enabled: false
  storage:
    type: s3
    bucketNames:
      chunks: loki-data
      ruler: loki-data
      admin: loki-data
    s3:
      endpoint: https://s3.aknuk.dev
      s3ForcePathStyle: true
  extraEnvFrom:
    - secretRef:
        name: observability-s3-secret
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: index_
          period: 24h
