loki:
  storage:
    type: s3
    bucketNames:
      chunks: loki
      ruler: loki
      admin: loki
    s3:
      endpoint: s3.aknuk.dev
      region: us-east-1
      s3ForcePathStyle: false
      insecure: false
      accessKeyId: ${AWS_ACCESS_KEY_ID}
      secretAccessKey: ${AWS_SECRET_ACCESS_KEY}
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: 2024-04-01
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: index_
          period: 24h
minio:
  enabled: false
write:
  replicas: 1
  persistence:
    storageClass: s3
    size: 10Gi
read:
  replicas: 1
backend:
  replicas: 1
  persistence:
    storageClass: s3
    size: 10Gi
gateway:
  enabled: false
global:
  extraEnv:
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: loki-s3-creds
          key: aws_access_key_id
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: loki-s3-creds
          key: aws_secret_access_key
  extraArgs:
    - "-config.expand-env=true"
