serviceAccount:
  create: true
  name: keda-operator

operator:
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

metricsServer:
  replicas: 2
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  useHostNetwork: false

webhooks:
  enabled: true

prometheus:
  metricServer:
    enabled: true
  
  operator:
    enabled: true
    port: 8080
    path: /metrics
  
  webhooks:
    enabled: true
    port: 8080
    path: /metrics

serviceMonitor:
  enabled: true
  namespace: observability
  interval: 30s
  scrapeTimeout: 10s
  labels:
    release: prometheus
