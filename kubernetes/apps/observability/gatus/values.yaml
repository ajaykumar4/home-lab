app:
  title: Status Page

service:
  app:
    port: 8080
    type: ClusterIP

ingress:
  enabled: false

persistence:
  data:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 5Gi
    storageClass: s3
    globalMounts:
      - path: /data

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

config:
  endpoints:
    - name: Status Page
      group: internal
      url: http://localhost:8080/health
      interval: 30s
      timeout: 5s
      
    - name: Grafana
      group: observability
      url: http://grafana
      interval: 30s
      timeout: 5s
      
    - name: Prometheus
      group: observability
      url: https://prometheus.aknuk.dev
      interval: 30s
      timeout: 5s
      
    - name: ArgoCD
      group: core
      url: http://argocd-server:80
      interval: 30s
      timeout: 5s
  
  ui:
    title: Home Lab Status
  
  storage:
    type: sqlite
    path: /data/gatus.db

serviceMonitor:
  enabled: true
  namespace: observability
  interval: 30s
  scrapeTimeout: 10s
  labels:
    release: grafana
  endpoints:
    - port: http
