opencost:
  exporter:
    defaultClusterId: "home-lab"
    defaultBillingCurrency: "USD"
    replicas: 2
  
  prometheus:
    external:
      url: "http://victoria-metrics-vmselect:8481/select/0"
  
  ui:
    enabled: true
  
  persistence:
    enabled: true
    storageClass: s3
    size: 10Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi

serviceMonitor:
  enabled: true
  namespace: observability
  interval: 30s
  scrapeTimeout: 10s
  labels:
    release: prometheus

ingress:
  enabled: false

service:
  type: ClusterIP
  port: 9003
