opencost:
  prometheus:
    internal:
      enabled: false
    external:
      enabled: true
      url: "http://mimir-gateway.observability.svc.cluster.local:80/prometheus"
  exporter:
    defaultClusterId: "home-lab"
    defaultBillingCurrency: "EUR"
    replicas: 2

  ui:
    enabled: true
    useIPv6: false
    httpRoute:
      enabled: true
      hostnames:
        - opencost.aknuk.dev
      parentRefs:
        - name: envoy-internal
          namespace: network
          sectionName: https

  exporter:
    persistence:
      enabled: true
      accessMode: ReadWriteOnce
      storageClass: s3-opencost
      size: 10Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi

ingress:
  enabled: false

service:
  type: ClusterIP
  port: 9003
