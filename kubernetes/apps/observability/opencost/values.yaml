opencost:
  exporter:
    defaultClusterId: "home-lab"
    defaultBillingCurrency: "USD"
    replicas: 2
  
  prometheus:
    external:
      url: "https://prometheus.aknuk.dev"
  
  ui:
    enabled: true
  
  exporter:
    persistence:
      enabled: true
      accessMode: ReadWriteOnce
      storageClass: s3
      size: 10Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi

serviceMonitor:
  enabled: true
  namespace: observability
  interval: 30s
  scrapeTimeout: 10s
  labels:
    release: grafana

ingress:
  enabled: false

service:
  type: ClusterIP
  port: 9003
