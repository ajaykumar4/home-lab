---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argo-cd
  namespace: argo-system
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  hostnames:
    - "argocd.aknuk.dev"
  rules:
    - backendRefs:
        - name: argo-cd-argocd-server
          port: 80
