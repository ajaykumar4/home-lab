podAnnotations:
  reloader.stakater.com/auto: "true"
githubConfigUrl: https://github.com/ajaykumar4/home-lab
githubConfigSecret: home-lab-runner-secret
minRunners: ${minRunners:=1}
maxRunners: ${maxRunners:=2} #Double total nodes
containerMode:
  type: kubernetes
  kubernetesModeWorkVolumeClaim:
    accessModes: ["ReadWriteOnce"]
    storageClassName: longhorn
    resources:
      requests:
        storage: 25Gi
controllerServiceAccount:
  name: actions-runner-controller
  namespace: actions-runner-system
template:
  spec:
    containers:
      - name: runner
        image: ghcr.io/home-operations/actions-runner:2.334.0@sha256:95d91d7f8d241e319ef2f4fec08f417aa1606b96fbb327643f75c303acd30002
        command:
          - /home/runner/run.sh
        env:
          - name: ACTIONS_RUNNER_REQUIRE_JOB_CONTAINER
            value: "false"
          - name: NODE
            valueFrom:
              fieldRef:
                fieldPath: status.hostIP
        volumeMounts:
          - mountPath: /var/run/secrets/talos.dev
            name: talos
            readOnly: true
    serviceAccountName: home-lab-runner
    volumes:
      - name: talos
        secret:
          secretName: home-lab-runner
